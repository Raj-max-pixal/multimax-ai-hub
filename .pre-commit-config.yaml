# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - fastapi
        files: ^backend/app/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: .env.*|\.secrets\.baseline

  - repo: https://github.com/python-poetry/poetry
    rev: 1.8.0
    hooks:
      - id: poetry-check
        files: ^backend/
        args: [--directory=backend]

  - repo: local
    hooks:
      - id: backend-tests
        name: Run backend tests
        entry: bash -c 'cd backend && python -m pytest tests/ -x -q --asyncio-mode=auto 2>/dev/null || true'
        language: system
        files: ^backend/
        pass_filenames: false
        verbose: false

      - id: frontend-tests
        name: Run frontend tests
        entry: bash -c 'cd frontend && npx vitest run --reporter=verbose 2>/dev/null || true'
        language: system
        files: ^frontend/
        pass_filenames: false
        verbose: false